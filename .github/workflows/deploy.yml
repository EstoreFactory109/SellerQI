# ============================================================================
# SellerQI — Deploy to EC2
# ============================================================================
#
# Automatically deploys the latest main branch to your EC2 instance via SSH.
# Can also be triggered manually from the GitHub Actions tab (workflow_dispatch).
#
# The frontend is built on the GitHub Actions runner (fast) and the built
# dist/ folder is copied to EC2 via SCP -- avoids slow builds on the VM.
#
# ── ONE-TIME SETUP (do these before the first run) ──────────────────────────
#
# Add these GitHub Secrets (repo → Settings → Secrets and variables → Actions):
#
#   Connection:
#      EC2_HOST                – EC2 public IP or hostname
#      EC2_USERNAME            – root
#      EC2_PASSWORD            – Your SSH password
#
#   Frontend env vars (copied from your client/.env on EC2):
#      VITE_BASE_URI           – API base URL
#      VITE_GOOGLE_CLIENT_ID   – Google OAuth client ID
#      VITE_APP_ID             – Amazon SP-API application ID
#      VITE_APP_BETA           – "true" or "false"
#
# The repo is already cloned on EC2 at ~/SellerQI.
# After adding the secrets, every push to main deploys automatically.
# ============================================================================

name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Build frontend
        working-directory: client
        env:
          VITE_BASE_URI: ${{ secrets.VITE_BASE_URI }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_APP_ID: ${{ secrets.VITE_APP_ID }}
          VITE_APP_BETA: ${{ secrets.VITE_APP_BETA }}
        run: |
          npm install
          npm run build

      - name: Copy built frontend to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          password: ${{ secrets.EC2_PASSWORD }}
          source: client/dist/
          target: ~/SellerQI/
          overwrite: true

      - name: Deploy server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          password: ${{ secrets.EC2_PASSWORD }}
          command_timeout: 12m
          script: |
            set -e

            cd SellerQI

            echo "── Stopping all PM2 processes ──"
            pm2 stop all || true
            pm2 kill || true

            echo "── Pulling latest changes ──"
            git fetch origin main
            # client/dist is built on the CI runner and SCP'd here, so it must NOT
            # be tracked. If an older checkout still tracks it, untrack it locally
            # (keeps the SCP'd files) so it can't block the update, then hard-reset
            # server code to origin. reset --hard leaves the untracked SCP'd dist intact.
            git rm -r --cached client/dist 2>/dev/null || true
            git reset --hard origin/main

            echo "── Installing server dependencies ──"
            npm install --omit=dev --ignore-scripts

            echo "── Starting PM2 processes ──"
            pm2 start ecosystem.config.js
            pm2 save

            # Configure PM2 log rotation AFTER the app is up, and never let it
            # abort the deploy (the script runs under `set -e`). Without rotation
            # pm2's out/error files grow unbounded and fill the disk overnight
            # (the worker log alone had reached 650M+). pm2-logrotate caps each
            # file and keeps a bounded, compressed history. Idempotent — safe to
            # re-run every deploy. All commands guarded so a logrotate hiccup can
            # never take the app down.
            echo "── Configuring PM2 log rotation ──"
            pm2 install pm2-logrotate || true
            pm2 set pm2-logrotate:max_size 50M || true
            pm2 set pm2-logrotate:retain 5 || true
            pm2 set pm2-logrotate:compress true || true
            pm2 set pm2-logrotate:rotateInterval '0 0 * * *' || true
            pm2 set pm2-logrotate:workerInterval 300 || true

            echo "── Deploy complete ──"
            pm2 ls
